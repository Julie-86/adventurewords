spring.application.name=adventurewords

# PostgreSQL configuration with Docker secrets
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username.file=${SPRING_DATASOURCE_USERNAME_FILE}
spring.datasource.password.file=${SPRING_DATASOURCE_PASSWORD_FILE}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=${SERVER_PORT:8081}

# Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
