apiVersion: v1
kind: Service
metadata:
  name: adventurewords
  labels:
    app: adventurewords   # Must match the label in the Deployment so selectors work correctly
spec:
  type: NodePort          # Exposes the service on a static port on each Node for external access
  selector:
    app: adventurewords   # Selects pods with this label (from the Deployment) to be part of the service
  ports:
    - name: http          # <- ADD THIS: name of the port for ServiceMonitor
      protocol: TCP
      port: 8081          # Internal port of the Service within the cluster
      targetPort: 8081    # Port on the container that the Service forwards traffic to
      nodePort: 30008     # External port on the Node to access the service from outside the cluster (must be 30000-32767)
